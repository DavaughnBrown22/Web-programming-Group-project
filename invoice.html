<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Invoice</title>
        <link rel="stylesheet" href="../Style.css/style.css">
        <style>
            .receipt-section {
                margin: 0 auto;
                width: 100%;
                display: flex;
                justify-content: center;
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }

            .receipt-card {
                width: 90%;
                max-width: 450px;
            }
            .receipt-box{
                background:white;
                border:2px dashed black;
                border-radius:8px;
                padding:15px;
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                font-size: 25px;
            }
            .receipt-box h3{
                margin-top:0;
                margin-bottom:10px;
                font-family:'Broadway', Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            }

            .receipt-box p{
                margin:6px 0;
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }

            #finishButton{
                background-color: black;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                font-size: 20px;
                cursor: pointer;
                margin-top: 20px;
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }
                /* Add hover effect to the finish button */
            #finishButton:hover {
                background-color: #333;
                transform: scale(1.05);
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }
        </style>
    </head>
    <body>
        <header>
            <nav class = "navigationbar">
                <div class="logo"></div>
                    <img src = "../Assets/GiftcardGo876.png" alt = "Gift card logo" style = "height: 90px; border-radius: 90%;">
                <ul class = "navigation-links">
                    <li><a href = "/Codes/product.html" class = "active"> Home </a></li>
                    <li><a href = "/Codes/AboutUs.html"> About Us </a></li>
                    <li><a href = "/Codes/index.html" >Login </a></li>
                    <li><a href = "/Codes/Cart.html"> Cart</a></li>
                </ul>
            </nav>
        </header>
        <main class="container">
            <!--Receipt section that will display the generated receipt based on user input-->
            <!-- Receipt section-->
            <section class="receipt-section" style="margin-left: 20%;">
                <div class="receipt-card" style="background:#cfd7df; width:max-content; height:max-content; padding:30px; border-radius:12px;">
                    <div class="receipt-box">
                        <center><h3 style="font-size:44px;">Invoice Receipt</h3></center>
                        <hr style="width:90px; margin: auto; border-color: cadetblue;" /><br>

                        <h3>GiftcardGo876</h3>
                        <br>

                        <h4>Invoice Number: <span id="rInvoiceId">---</span></h4>
                        <hr>
                        <p>Date of Invoice: <span id="rDate">---</span></p>
                        <hr>
                        <p>TRN: <strong><span id="rTRN">---</span></strong></p>
                        <hr>
                        <p>Full Name: <strong><span id="rFullname">---</span></strong></p>
                        <hr>
                        <p>Address: <strong><span id="rAddress">---</span></strong></p>
                        <hr><br>

                        <p style="font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;"><strong>
                            Purchased Items:</strong></p>
                        <div id="rCheckoutItems"></div><br>

                        <p><strong>Total Cost:</strong> $<span id="rAmount">---</span></p>
                    </div>
                    <button id="finishButton" onclick="finishOrder()">Finish</button>
                </div>
            </section>
            <br><br><br>
        </main>
        <script src="../Style.css/checkout.js"></script>
    </body> 
</html>
