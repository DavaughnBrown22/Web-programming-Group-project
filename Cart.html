<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset="utf-8"/>
        <meta name = "viewport" content = "width=device-width,inital-scale=1" />
        <title> About Us </title>
        <link rel = "stylesheet" href="../Style.css/style.css ">
        <style>
            .title{
                text-align: center;
                font-size: 56px;
                font-family:'Broadway', Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
                color: darkblue;
                margin-bottom: 30px;
            }
            .Cart-Table{
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 20px;
            }
            .Cart-Table th, .Cart-Table td{
                padding: 8px;
                text-align: center;
                font-size: 28px;
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }
        </style>
    </head>
    <body> 
        <header>
            <nav class = "navigationbar">
                <div class="logo"></div>
                    <img src = "../Assets/GiftcardGo876.png" alt = "Gift card logo" style = "height: 90px; border-radius: 90%;">
                <ul class = "navigation-links">
                    <li><a href = "/Codes/product.html" class = "active"> Home </a></li>
                    <li><a href = "/Codes/AboutUs.html"> About Us </a></li>
                    <li><a href = "/Codes/index.html" >Login </a></li>
                    <li><a href = "/Codes/Cart.html"> Cart</a></li>
                </ul>
            </nav>
        </header>
        <main class = "container">

            <br><br>
            <h1 class = "title"> Your Shopping Cart</h1>
            <br><br>
                <table id = "TableCart" class = "Cart-Table">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Tax</th>
                            <th>Discount</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id = "cartItems"></tbody>
                </table>
                <br><br><br><br>
                <div class  = "Summary-Cart">
                    <p> Total Cost: <span id = "Total">$0.00</span></p>
                    <button onclick = "clearCart()">Clear All</button>
                    <a href="Checkout.html"><button>Check Out</button></a>
                </div>
        </main>
        <script>
            function loadCart(){
                let CartData = localStorage.getItem('gf_cart');
                let cart = JSON.parse(CartData);

                if(cart ==null){
                    cart =[];
                }

                let tableBody = document.getElementById('cartItems');
                let totalDisplay = document.getElementById('Total');
                let finalBill = 0;

                tableBody.innerHTML = "";

                for(let i = 0; i <cart.length; i++){
                    let itemName = cart [i].name;
                    let itemPrice = parseFloat(cart[i].price);

                    let tax = itemPrice * 0.15;
                    let discount = itemPrice * 0.10;
                    let Subtotal = (itemPrice + tax) - discount;
                
                    //table row for each item in the cart
                    let row = "<tr>";
                    row += "<td>" + itemName + "</td>";
                    row += "<td>$" + itemPrice.toFixed(2) + "</td>";
                    row += "<td>1</td>";
                    row += "<td>$" + tax.toFixed(2) + "</td>";
                    row += "<td>-$" + discount.toFixed(2) + "</td>";
                    row += "<td>$" + Subtotal.toFixed(2)+ "</td>";
                    row += "</tr>";

                    tableBody.innerHTML += row;

                    finalBill = finalBill + Subtotal;
                    
                    totalDisplay.innerHTML = "$" + finalBill.toFixed(2);

                    // SAVE TOTAL FOR CHECKOUT PAGE
                    localStorage.setItem('gf_total', finalBill.toFixed(2));
                }

                totalDisplay.innerHTML = "$" +  finalBill.toFixed(2);
            }

            function clearCart(){
                localStorage.removeItem('gf_cart');
                loadCart();
            }

            window.onload = loadCart;
        </script>
    </body>
</html>
