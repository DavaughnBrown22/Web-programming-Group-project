<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Checkout Page </title>
        <link rel="stylesheet" href="../Style.css/style.css">
        <style>
            .checkout-form label, button{
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }
        </style>
    </head>
    <body>
        <header>
            <nav class = "navigationbar">
                <div class="logo"></div>
                    <img src = "../Assets/GiftcardGo876.png" alt = "Gift card logo" style = "height: 90px; border-radius: 90%;">
                <ul class = "navigation-links">
                    <li><a href = "/Codes/product.html" class = "active"> Home </a></li>
                    <li><a href = "/Codes/AboutUs.html"> About Us </a></li>
                    <li><a href = "/Codes/index.html" >Login </a></li>
                    <li><a href = "/Codes/Cart.html"> Cart</a></li>
                </ul>
            </nav>
        </header>
        <header>
        <br><br>
        <main class="container">
            <h1 class="title" style="font-size: 56px; text-align: center; font-family:'Broadway', Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Checkout Summary</h1>
            <!--Checkout Summary-->
            <section class="Summary-Cart">
                <h3>Your Order</h3>
                <div id="checkoutItems">
                    </div>
                <p><strong>Total Amount to Pay: </strong> <span id="checkoutTotal">$0.00</span></p>
            </section>
            <hr>
            <br><br>
            <!--Checkout Form-->
            <section class="checkout-form" style="font-size: 34px;">
                <h3 style="margin-left: 10px; font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;"> Shipping & Payment Details</h3>
                <form id="paymentForm" style="background-color: darkslateblue;">
                    <label for="fullName">Full Name:</label><br>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                    <br><br>
                    <label for="Trn">Tax Registration Number (TRN):</label><br>
                    <input type="text" id="Trn" placeholder="Enter your TRN" required>
                    <br><br>
                    <label for="Address">Address:</label><br>
                    <textarea id="address" placeholder="Enter your Address" required></textarea>
                    <br><br>
                    <label for="amountPaid">Amount Being Paid ($):</label><br>
                    <input type="number" id="amountPaid" step="0.01" required>
                    <br>
                    <div class="form-buttons">
                        <button type="button" onclick="confirmOrder()">Confirm</button>
                        <button type="reset" onclick="cancelOrder()">Cancel</button>
                    </div>
                </form>
            </section>
            <!--Summary CART-->
            <div class="Summary-Cart">
                <div class="buttons">
                    <button onclick="clearCart()">Clear All</button>
                    <button onclick="processCheckout()">Check Out</button>
                    <button onclick="window.location.href='../Codes/product.html'">Close</button>
                </div>
            </div>
            <br><br><br>
        </main>
        <script src="../Style.css/checkout.js"></script>
    </body>
</html>
