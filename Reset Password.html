<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset="utf-8"/>
        <meta name = "viewport" content = "width=device-width,inital-scale=1" />
        <title> Reset Password </title>
        <link rel = "stylesheet" href="../Style.css/style.css ">
        <style>
            body{
                background-color: rgb(255, 255, 255);
            }
            .form-container{
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .pageform{
                background-color: rgb(243, 242, 242);
                padding: 40px;
                border-radius: 10px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                width: 100%;
                max-width: 500px;
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }
            .pageform a{
                color: darkblue;
                text-decoration: none;
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }
            .pageform h2{
                text-align: center;
                margin-bottom: 30px;
                color: darkblue;
                font-size: 56px;
                font-family:'Broadway', Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            }
            .page-group{
                margin-bottom: 20px;
            }
            .page-group label{
                display: block;
                margin-bottom: 8px;
                font-weight: bold;
                font-size:36px;
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }
            .page-group input{
                width: 100%;
                padding: 10px;
                border-radius: 5px;
                border: 1px solid #ccc;
                font-size:26px;
            }
            .button-group button {
                width: 48%;
                padding: 10px;
                border-radius: 5px;
                border:none;
                cursor: pointer;
                font-size: 26px;
                font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            }
            .button-group button[type="submit"] {
                background-color: darkblue;
                color: white;
            }
            .button-group button[type="button"] {
                background-color: #af2323;
                color: white;
            }
        </style>
    </head>
    <body>
        <header>
            <nav class = "navigationbar">
                <div class="logo"></div>
                    <img src = "../Assets/GiftcardGo876.png" alt = "Gift card logo" style = "height: 90px; border-radius: 90%;">
                <ul class = "navigation-links">
                    <li><a href = "/Codes/product.html" class = "active"> Home </a></li>
                    <li><a href = "/Codes/AboutUs.html"> About Us </a></li>
                    <li><a href = "/Codes/index.html" >Login </a></li>
                    <li><a href = "/Codes/Cart.html"> Cart</a></li>
                </ul>
            </nav>
        </header>
        <main class = "form-container">
            <form id = "resetform" class = "pageform">
                <h2>Rest Your Password</h2>

                <div class = "page-group">
                    <label for= 'restTrn'> Enter Your TRN: </label>
                    <input type = "text" id = "trn" name = 'trn' placeholder = "000-000-000" required>
                </div>

                <div class = "page-group">
                    <label for= 'newPassword'> Update Password</label>
                    <input type = "password" id = "newPassword" name = 'password' required>
                </div>
                <div class = "button-group">
                    <button type = "submit"> Update Password </button>
                    <button type = "button" onclick = "window.location.href = '../Codes/index.html'"> Back to Login</button>
                </div>

                <p id  = "resetMessage" style = "font-weight :bold;"></p>
            </form>
        </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
        let resetform = document.getElementById('resetform');

        resetform.addEventListener('submit', (e) => {
            e.preventDefault();

            let trn = document.getElementById('trn').value.trim();
            let password = document.getElementById('newPassword').value.trim();
            let msg = document.getElementById("resetMessage");

            let storedData = localStorage.getItem("RegistrationData");

            if(storedData !=null){
                let userArray = JSON.parse(storedData);
                let UserFound = false;

                for (let i = 0; i < userArray.length; i++) {
                        if (userArray[i].trn === trn) {
                            
                            userArray[i].password = password;
                            UserFound = true;
                            break; 
                        }
                    }

                    if (UserFound) {
                        localStorage.setItem("RegistrationData", JSON.stringify(userArray));

                        msg.style.color = "green";
                        msg.innerHTML = "Password updated successfully! Redirecting...";

                        setTimeout(function(){
                            window.location.href = "../Codes/index.html";
                        }, 2000);
                    } else {
                        msg.style.color = "red";
                        msg.innerHTML = "TRN not found. Please check your details.";
                    }
                } else {
                    msg.style.color = "red";
                    msg.innerHTML = "No registered users found.";
                }
            });
        });
    </script>
    </body>
</html>
