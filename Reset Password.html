<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset="utf-8"/>
    <meta name = "viewport" content = "width=device-width,inital-scale=1" />
    <title> Reset Password </title>
    <link rel = "stylesheet" href="../Style.css/style.css ">
</head>
<body>
    <body>
    <main class = "form-container">
        <form id = "resetform" class = "pageform">
            <h2>Rest Your Password</h2>

            <div class = "page-group">
                <label for= 'restTrn'> Enter Your TRN: </label>
                <input type = "text" id = "trn" name = 'trn' placeholder = "000-000-000" required>
            </div>

            <div class = "page-group">
                <label for= 'newPassword'> Update Password</label>
                <input type = "password" id = "newPassword" name = 'password' required>
            </div>
            <div class = "button-group">
                <button type = "submit"> Update Password </button>
                <button type = "button" onclick = "window.location.href = 'Login.html'"> Back to Login</button>
            </div>

            <p id  = "resetMessage" style = "font-weight :bold;"></p>
        </form>
    </main>
<script>
    document.addEventListener('DOMContentLoaded', () => {
    let resetform = document.getElementById('resetform');

    resetform.addEventListener('submit', (e) => {
        e.preventDefault();

        let trn = document.getElementById('trn').value.trim();
        let password = document.getElementById('newPassword').value.trim();
        let msg = document.getElementById("resetMessage");

        let storedData = localStorage.getItem("RegistrationData");

        if(storedData !=null){
            let userArray = JSON.parse(storedData);
            let UserFound = false;

            for (let i = 0; i < userArray.length; i++) {
                    if (userArray[i].trn === trn) {
                        
                        userArray[i].password = password;
                        UserFound = true;
                        break; 
                    }
                }

                if (UserFound) {
                    localStorage.setItem("RegistrationData", JSON.stringify(userArray));

                    msg.style.color = "green";
                    msg.innerHTML = "Password updated successfully! Redirecting...";

                    setTimeout(function(){
                        window.location.href = "Login.html";
                    }, 2000);
                } else {
                    msg.style.color = "red";
                    msg.innerHTML = "TRN not found. Please check your details.";
                }
            } else {
                msg.style.color = "red";
                msg.innerHTML = "No registered users found.";
            }
        });
    });
</script>
</body>
</html>
